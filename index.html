<title>Tuti Khamun</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0c0c;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh}

header{text-align:center;padding:44px 20px 24px;border-bottom:1px solid #1c1c1c}
header h1{font-size:1.9rem;font-weight:300;letter-spacing:8px;text-transform:uppercase;color:#fff}
header p{color:#444;font-size:0.7rem;letter-spacing:4px;margin-top:10px;text-transform:uppercase}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
  padding:28px 20px;
  max-width:1200px;
  margin:0 auto
}

.card{
  aspect-ratio:1/1;
  overflow:hidden;
  border-radius:10px;
  cursor:pointer;
  background:#181818;
  position:relative;
  transition:transform .2s,box-shadow .2s
}
.card:hover{transform:scale(1.04);box-shadow:0 8px 28px rgba(0,0,0,.7)}
.card img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .35s}
.card img.loaded{opacity:1}

.pagination{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  padding:24px 16px 40px;
  flex-wrap:wrap
}
.pagination button{
  background:#181818;
  color:#aaa;
  border:1px solid #2a2a2a;
  padding:7px 13px;
  border-radius:6px;
  cursor:pointer;
  font-size:.82rem;
  transition:background .18s,color .18s;
  min-width:38px
}
.pagination button:hover{background:#2a2a2a;color:#fff}
.pagination button.active{background:#fff;color:#000;font-weight:600}
.pagination button:disabled{opacity:.3;cursor:default}
.pg-dots{color:#444;padding:0 4px}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.94);
  z-index:999;
  align-items:center;
  justify-content:center
}
.modal.open{display:flex}
.modal-img{
  max-width:92vw;
  max-height:92vh;
  object-fit:contain;
  border-radius:6px;
  box-shadow:0 0 80px rgba(0,0,0,.9);
  display:block
}
.modal-close{
  position:fixed;top:16px;right:20px;
  background:none;border:none;
  color:#fff;font-size:1.8rem;cursor:pointer;
  opacity:.65;transition:opacity .2s;z-index:1001;
  line-height:1
}
.modal-close:hover{opacity:1}
.modal-btn{
  position:fixed;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.1);border:none;
  color:#fff;font-size:1.6rem;
  width:46px;height:46px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;z-index:1001
}
.modal-btn:hover{background:rgba(255,255,255,.22)}
#modalPrev{left:10px}
#modalNext{right:10px}
.modal-counter{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  color:#555;font-size:.72rem;letter-spacing:2px;z-index:1001
}

footer{
  text-align:center;padding:20px;
  color:#282828;font-size:.68rem;letter-spacing:2px
}
</style>
</head>

const IMGS = FILES.map(f => BASE + f);

let page = 1;
let mIdx = -1;
const total = () => Math.ceil(IMGS.length / PER);

const $gallery = document.getElementById('gallery');
const $pagination = document.getElementById('pagination');
const $modal = document.getElementById('modal');
const $modalImg = document.getElementById('modalImg');
const $counter = document.getElementById('modalCounter');

function render(p) {
  page = p;
  $gallery.innerHTML = '';
  const s = (p - 1) * PER;
  const e = Math.min(s + PER, IMGS.length);
  for (let i = s; i < e; i++) {
    const card = document.createElement('div');
    card.className = 'card';
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.src = IMGS[i];
    img.alt = '';
    img.onload = () => img.classList.add('loaded');
    img.onerror = () => { card.style.display = 'none'; };
    card.appendChild(img);
    (function(idx) { card.onclick = () => openModal(idx); })(i);
    $gallery.appendChild(card);
  }
  renderPag(p);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderPag(p) {
  $pagination.innerHTML = '';
  const tot = total();

  const prev = btn('&larr;', () => render(p-1));
  prev.disabled = p === 1;
  $pagination.appendChild(prev);

  const range = new Set([1, tot]);
  for (let i = Math.max(2, p-2); i <= Math.min(tot-1, p+2); i++) range.add(i);
  const sorted = [...range].sort((a,b)=>a-b);
  let last = 0;
  sorted.forEach(n => {
    if (last && n - last > 1) {
      const d = document.createElement('span');
      d.className = 'pg-dots'; d.textContent = '…';
      $pagination.appendChild(d);
    }
    const b = btn(n, () => render(n));
    if (n === p) b.classList.add('active');
    $pagination.appendChild(b);
    last = n;
  });

  const next = btn('&rarr;', () => render(p+1));
  next.disabled = p === tot;
  $pagination.appendChild(next);
}

function btn(label, fn) {
  const b = document.createElement('button');
  b.innerHTML = label;
  b.onclick = fn;
  return b;
}

function openModal(i) {
  mIdx = i;
  $modalImg.src = IMGS[i];
  $counter.textContent = (i+1) + ' / ' + IMGS.length;
  $modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  $modal.classList.remove('open');
  $modalImg.src = '';
  document.body.style.overflow = '';
}

function navModal(dir) {
  mIdx = (mIdx + dir + IMGS.length) % IMGS.length;
  $modalImg.src = IMGS[mIdx];
  $counter.textContent = (mIdx+1) + ' / ' + IMGS.length;
  const np = Math.ceil((mIdx+1) / PER);
  if (np !== page) render(np);
}

document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalPrev').onclick = () => navModal(-1);
document.getElementById('modalNext').onclick = () => navModal(1);
$modal.addEventListener('click', e => { if(e.target === $modal) closeModal(); });
document.addEventListener('keydown', e => {
  if (!$modal.classList.contains('open')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') navModal(-1);
  if (e.key === 'ArrowRight') navModal(1);
});

render(1);
</script>
